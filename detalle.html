<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detalle completo de una licitación pública: información, comprador, productos y adjudicación.">
  <title>Detalle de licitación — LicitaSeguro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <a href="#contenido" class="skip-link">Saltar al contenido principal</a>

  <!-- Navbar -->
  <header>
    <nav class="navbar navbar-expand-md navbar-ls" aria-label="Navegación principal">
      <div class="container">
        <a class="navbar-brand" href="index.html" aria-label="LicitaSeguro, ir a inicio">
          <i class="bi bi-shield-check" aria-hidden="true"></i> LicitaSeguro
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#menuPrincipal" aria-controls="menuPrincipal"
                aria-expanded="false" aria-label="Abrir o cerrar menú">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link activo" href="licitaciones.html" aria-current="page">Licitaciones</a></li>
            <li class="nav-item"><a class="nav-link" href="proveedores.html">Proveedores</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main id="contenido" class="container py-4 py-md-5">

    <!-- Botón volver -->
    <a href="licitaciones.html" class="btn-volver">
      <i class="bi bi-arrow-left" aria-hidden="true"></i> Volver al listado
    </a>

    <!-- Mostramos el código apenas se carga la página, antes del fetch.
         Da feedback visual inmediato al usuario de que llegó a la página correcta. -->
    <p class="text-muted small mb-3">
      Licitación: <strong id="dt-codigo">cargando…</strong>
    </p>

    <!-- Loader -->
    <div id="loader" class="loader-wrap d-none" role="status" aria-live="polite">
      <div class="loader-spinner" aria-hidden="true"></div>
      <p>Cargando detalle de la licitación…</p>
    </div>

    <!-- JS inyecta TODO el detalle aquí (header, info, comprador, items) -->
    <div id="detalle-contenido"></div>

  </main>

  <footer class="footer-ls">
    <div class="container">
      <div class="row">
        <div class="col-md-6"><strong>LicitaSeguro</strong> — Información pública, accesible.</div>
        <div class="col-md-6 text-md-end mt-3 mt-md-0">
          Datos: <a href="https://api.mercadopublico.cl/" target="_blank" rel="noopener">API Mercado Público</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/detalle.js"></script>
</body>
</html>
